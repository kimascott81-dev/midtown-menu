<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Midtown Mixology</title>
<style>
  :root {
    --neon-cyan: #00f3ff;
    --neon-pink: #ff00aa;
    --neon-gold: #ffd700;
    --neon-lime: #39ff14;
    --dark-bg: #0a0a12;
    --panel-bg: rgba(20, 20, 35, 0.9);
    --glass-border: rgba(255, 255, 255, 0.12);
    --text-primary: #ffffff;
    --text-secondary: #b0b0c0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--dark-bg); color: var(--text-primary);
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden; touch-action: manipulation;
  }
  .bg-animation {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,0,170,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0,243,255,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(255,215,0,0.08) 0%, transparent 50%);
  }
  .bubble {
    position: absolute; bottom: -60px;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), rgba(255,255,255,0.05));
    border-radius: 50%; opacity: 0.25;
    animation: rise 10s infinite ease-in;
    pointer-events: none;
  }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0.25; }
    100% { transform: translateY(-120vh) scale(0.4); opacity: 0; }
  }
  #app {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
  }
  header {
    padding: 14px 20px;
    background: linear-gradient(90deg, rgba(0,243,255,0.08), rgba(255,0,170,0.08));
    border-bottom: 1px solid var(--glass-border);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .logo {
    font-size: 1.5rem; font-weight: 900;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: glowText 3s ease-in-out infinite alternate;
  }
  @keyframes glowText {
    from { filter: drop-shadow(0 0 5px rgba(0,243,255,0.4)); }
    to { filter: drop-shadow(0 0 20px rgba(255,0,170,0.6)); }
  }
  .nav-btn {
    background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
    color: var(--text-primary); padding: 10px 18px; border-radius: 12px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
  }
  .nav-btn:active { background: rgba(0,243,255,0.25); border-color: var(--neon-cyan); }
  main {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 20px; position: relative;
  }
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 3px; }

  /* Radio navigation system */
  .nav-radio { display: none; }
  .view { display: none; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

  #nav-home:checked ~ #view-home,
  #nav-browse:checked ~ #view-browse,
  #nav-inventory:checked ~ #view-inventory,
  #nav-create:checked ~ #view-create,
  #nav-recipe:checked ~ #view-recipe,
  #nav-myrecipes:checked ~ #view-myrecipes { display: block; }

  /* Home */
  .home-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 18px; max-width: 700px; margin: 30px auto;
  }
  .home-card {
    background: var(--panel-bg);
    border: 2px solid var(--glass-border);
    border-radius: 24px; padding: 28px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.25s;
    min-height: 160px; text-align: center;
    text-decoration: none; color: var(--text-primary);
  }
  .home-card::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: conic-gradient(from 0deg, transparent, var(--neon-cyan), transparent 30%);
    animation: rotate 4s linear infinite; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  @keyframes rotate { 100% { transform: rotate(360deg); } }
  .home-card:hover::before, .home-card:active::before { opacity: 0.3; }
  .home-card-inner {
    position: relative; z-index: 1;
    background: var(--panel-bg); border-radius: 22px;
    width: calc(100% - 4px); height: calc(100% - 4px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; text-align: center;
  }
  .home-card:active {
    transform: scale(0.98);
    border-color: var(--neon-cyan);
    box-shadow: 0 0 25px rgba(0,243,255,0.2);
  }
  .home-icon { font-size: 3rem; margin-bottom: 10px; }
  .home-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 5px; }
  .home-desc { font-size: 0.85rem; color: var(--text-secondary); }
  @media (max-width: 500px) {
    .home-grid { grid-template-columns: 1fr; margin: 20px auto; }
    .home-card { min-height: 110px; flex-direction: row; gap: 16px; padding: 18px 24px; text-align: left; }
    .home-icon { margin-bottom: 0; font-size: 2.5rem; }
  }

  /* Section titles */
  .section-title { font-size: 1.7rem; font-weight: 900; margin-bottom: 6px; }
  .section-sub { color: var(--text-secondary); margin-bottom: 18px; font-size: 1rem; }

  /* Filters */
  .filter-bar {
    display: flex; gap: 8px; overflow-x: auto;
    margin-bottom: 16px; padding-bottom: 8px;
  }
  .filter-chip {
    padding: 8px 18px; border-radius: 50px;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.05); color: var(--text-secondary);
    font-weight: 700; cursor: pointer; white-space: nowrap;
    font-size: 0.9rem; transition: all 0.2s;
  }
  .filter-chip.active {
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    color: #000; border-color: transparent;
    box-shadow: 0 0 12px rgba(0,243,255,0.35);
  }

  /* Cards */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .card {
    background: var(--panel-bg);
    border: 1px solid var(--glass-border);
    border-radius: 18px; padding: 16px;
    text-align: center; cursor: pointer;
    transition: all 0.2s; position: relative;
  }
  .card:active {
    transform: translateY(-4px);
    box-shadow: 0 6px 25px rgba(0,243,255,0.12);
    border-color: var(--neon-cyan);
  }
  .card-emoji { font-size: 2.6rem; line-height: 1; margin-bottom: 8px; display: block; }
  .card-title { font-weight: 800; font-size: 1rem; margin-bottom: 3px; }
  .card-meta { font-size: 0.78rem; color: var(--text-secondary); }
  .item-selected {
    border-color: var(--neon-lime) !important;
    box-shadow: 0 0 18px rgba(57,255,20,0.25) !important;
    background: rgba(57,255,20,0.06) !important;
  }
  .item-selected::after {
    content: '✓'; position: absolute; top: 6px; right: 10px;
    color: var(--neon-lime); font-weight: 900; font-size: 1.1rem;
  }

  /* Recipe detail */
  .recipe-hero {
    background: var(--panel-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px; padding: 24px;
    margin-bottom: 16px; text-align: center;
    position: relative; overflow: hidden;
  }
  .recipe-hero::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold));
  }
  .recipe-emoji { font-size: 4.5rem; margin-bottom: 10px; display: block; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .recipe-name { font-size: 1.7rem; font-weight: 900; margin-bottom: 5px; }
  .recipe-creator { color: var(--neon-gold); font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
  .badge {
    display: inline-block; padding: 5px 14px; border-radius: 50px;
    background: rgba(0,243,255,0.12); border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan); font-weight: 700; font-size: 0.8rem; margin: 0 3px 6px;
  }
  .ingredient-list {
    background: rgba(0,0,0,0.25); border-radius: 14px;
    padding: 16px; margin: 14px 0; text-align: left;
  }
  .ingredient-row {
    display: flex; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 1rem;
  }
  .ingredient-row:last-child { border-bottom: none; }
  .qty { color: var(--neon-cyan); font-weight: 800; }

  /* Buttons */
  .btn {
    display: block; width: 100%; padding: 14px 28px;
    margin-top: 10px; border: none; border-radius: 14px;
    font-size: 1rem; font-weight: 800; cursor: pointer;
    transition: all 0.2s; text-transform: uppercase;
    letter-spacing: 0.5px; color: #fff; font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    color: #000; box-shadow: 0 0 18px rgba(0,243,255,0.25);
  }
  .btn-primary:active { transform: scale(1.02); box-shadow: 0 0 28px rgba(0,243,255,0.4); }
  .btn-gold { background: linear-gradient(90deg, var(--neon-gold), #ffaa00); color: #000; }
  .btn-outline {
    background: transparent; border: 2px solid var(--glass-border);
    color: var(--text-primary);
  }
  .btn-outline:active { border-color: var(--neon-cyan); background: rgba(0,243,255,0.08); }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn-row .btn { margin-top: 0; }

  /* Forms */
  .form-group { margin-bottom: 18px; }
  label {
    display: block; margin-bottom: 6px;
    color: var(--neon-cyan); font-weight: 700; font-size: 0.85rem;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  input, textarea, select {
    width: 100%; padding: 14px; border-radius: 12px;
    background: rgba(0,0,0,0.35); border: 1px solid var(--glass-border);
    color: var(--text-primary); font-size: 1.05rem; outline: none;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 12px rgba(0,243,255,0.15);
  }
  textarea { min-height: 90px; resize: vertical; }

  /* Steps */
  .step-indicator { display: flex; gap: 6px; margin-bottom: 20px; justify-content: center; }
  .step-dot { width: 40px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.08); transition: all 0.3s; }
  .step-dot.active { background: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); }
  .step-dot.done { background: var(--neon-lime); }

  /* Empty */
  .empty { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
  .empty-emoji { font-size: 4rem; margin-bottom: 14px; opacity: 0.5; }

  /* Print */
  @media print {
    header, .no-print, .bg-animation, .bubble { display: none !important; }
    body { background: #fff; color: #000; overflow: visible; }
    #app { height: auto; }
    main { overflow: visible; padding: 0; }
    .recipe-hero { border: 2px solid #000; box-shadow: none; page-break-inside: avoid; }
    .view { display: none !important; }
    #view-recipe.view { display: block !important; }
  }
</style>
</head>
<body>
<div class="bg-animation" id="bgAnim"></div>

<div id="app">
  <header>
    <div class="logo">🍹 MIDTOWN MIXOLOGY</div>
    <label for="nav-home" class="nav-btn no-print">🏠 Home</label>
  </header>

  <main>
    <!-- Hidden radio buttons for CSS navigation -->
    <input type="radio" name="view" id="nav-home" class="nav-radio" checked>
    <input type="radio" name="view" id="nav-browse" class="nav-radio">
    <input type="radio" name="view" id="nav-inventory" class="nav-radio">
    <input type="radio" name="view" id="nav-create" class="nav-radio">
    <input type="radio" name="view" id="nav-recipe" class="nav-radio">
    <input type="radio" name="view" id="nav-myrecipes" class="nav-radio">

    <!-- HOME -->
    <div id="view-home" class="view">
      <div style="text-align:center; margin-top: 16px;">
        <h1 style="font-size: 1.9rem; margin-bottom: 6px;">What are we making tonight?</h1>
        <p class="section-sub" style="text-align:center;">Tap an option to get started</p>
      </div>
      <div class="home-grid">
        <label for="nav-browse" class="home-card" onclick="renderBrowse('All')">
          <div class="home-icon">📖</div>
          <div class="home-title">Browse Menu</div>
          <div class="home-desc">Explore our signature drinks & shots</div>
        </label>
        <label for="nav-inventory" class="home-card">
          <div class="home-icon">🧪</div>
          <div class="home-title">Our Inventory</div>
          <div class="home-desc">See what spirits & mixers we stock</div>
        </label>
        <label for="nav-create" class="home-card" onclick="startCreate()">
          <div class="home-icon">⚗️</div>
          <div class="home-title">Create Your Own</div>
          <div class="home-desc">Build a custom drink or shot</div>
        </label>
        <label for="nav-myrecipes" class="home-card" onclick="renderMyRecipes()">
          <div class="home-icon">💾</div>
          <div class="home-title">My Recipes</div>
          <div class="home-desc">View saved custom creations</div>
        </label>
      </div>
    </div>

    <!-- BROWSE -->
    <div id="view-browse" class="view">
      <div class="section-title">📖 Drink Menu</div>
      <div class="section-sub">Tap any drink to see the recipe</div>
      <div class="filter-bar" id="browseFilters"></div>
      <div class="card-grid" id="browseGrid"></div>
    </div>

    <!-- INVENTORY -->
    <div id="view-inventory" class="view">
      <div class="section-title">🧪 Inventory</div>
      <div class="section-sub">Everything behind our bar</div>
      <div class="filter-bar" id="invFilters"></div>
      <div class="card-grid" id="invGrid"></div>
    </div>

    <!-- CREATE -->
    <div id="view-create" class="view">
      <div class="section-title">⚗️ Drink Lab</div>
      <div class="section-sub">Craft your masterpiece</div>
      <div class="step-indicator" id="stepIndicator">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>

      <div id="create-step-1">
        <div class="form-group">
          <label>Drink or Shot Name</label>
          <input type="text" id="createName" placeholder="e.g., The Midnight Spark">
        </div>
        <div class="form-group">
          <label>Created By (Your Name)</label>
          <input type="text" id="createCreator" placeholder="e.g., Alex">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="createType">
            <option value="Cocktail">🍸 Cocktail</option>
            <option value="Shot">🥃 Shot</option>
            <option value="Mocktail">🧃 Mocktail</option>
            <option value="Special">✨ Special</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="nextStep(2)">Next: Pick Ingredients →</button>
      </div>

      <div id="create-step-2" style="display:none;">
        <div class="filter-bar" id="createFilters"></div>
        <div style="margin-bottom: 10px; color: var(--neon-lime); font-weight: 800;">
          Selected: <span id="selectedCount">0</span> items
        </div>
        <div class="card-grid" id="createGrid"></div>
        <div class="btn-row">
          <button class="btn btn-outline" onclick="prevStep(1)">← Back</button>
          <button class="btn btn-primary" onclick="nextStep(3)">Next: Details →</button>
        </div>
      </div>

      <div id="create-step-3" style="display:none;">
        <div id="selectedIngredientsReview"></div>
        <div class="form-group" style="margin-top: 15px;">
          <label>Instructions / Build Order</label>
          <textarea id="createInstructions" placeholder="1. Fill shaker with ice...&#10;2. Add vodka and...&#10;3. Shake and strain into..."></textarea>
        </div>
        <div class="form-group">
          <label>Glass Type</label>
          <select id="createGlass">
            <option>Rocks Glass</option>
            <option>Collins Glass</option>
            <option>Martini Glass</option>
            <option>Shot Glass</option>
            <option>Mug</option>
            <option>Other</option>
          </select>
        </div>
        <div class="btn-row">
          <button class="btn btn-outline" onclick="prevStep(2)">← Back</button>
          <button class="btn btn-primary" onclick="nextStep(4)">Next: Preview →</button>
        </div>
      </div>

      <div id="create-step-4" style="display:none;">
        <div id="createPreview"></div>
        <div class="btn-row">
          <button class="btn btn-outline" onclick="prevStep(3)">← Edit</button>
          <button class="btn btn-gold" onclick="saveCreation()">💾 Save Recipe</button>
        </div>
      </div>
    </div>

    <!-- RECIPE DETAIL -->
    <div id="view-recipe" class="view">
      <div id="recipeContent"></div>
      <div class="no-print" style="margin-top: 15px;">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="window.print()">🖨️ Print for Bartender</button>
          <button class="btn btn-outline" onclick="goBack()">← Back</button>
        </div>
      </div>
    </div>

    <!-- MY RECIPES -->
    <div id="view-myrecipes" class="view">
      <div class="section-title">💾 My Creations</div>
      <div class="section-sub">All your custom recipes saved on this device</div>
      <div id="myRecipesList"></div>
    </div>
  </main>
</div>

    id:'d5', name:'Firecracker', creator:'House', type:'Shot', glass:'Shot Glass',
    emoji:'🧨', instructions:'Layer Fireball and peach schnapps in shot glass.',
    ingredients:[{id:'whi3', qty:'1 oz'}, {id:'liq3', qty:'1 oz'}]
  },
  {
    id:'d6', name:'Gin Garden', creator:'House', type:'Cocktail', glass:'Collins Glass',
    emoji:'🌿', instructions:'Build gin, sour mix, and club soda over ice. Top with mint.',
    ingredients:[{id:'gin1', qty:'2 oz'}, {id:'mix4', qty:'2 oz'}, {id:'mix6', qty:'2 oz'}, {id:'gar4', qty:'3 leaves'}]
  },
  {
    id:'d7', name:'Cran-Teq Cooler', creator:'House', type:'Cocktail', glass:'Rocks Glass',
    emoji:'🫐', instructions:'Shake tequila, triple sec, and cranberry with ice. Strain over fresh ice. Lime wedge garnish.',
    ingredients:[{id:'teq1', qty:'2 oz'}, {id:'liq1', qty:'0.5 oz'}, {id:'mix2', qty:'3 oz'}, {id:'gar1', qty:'1 wedge'}]
  },
  {
    id:'d8', name:'Apple Pie Shot', creator:'House', type:'Shot', glass:'Shot Glass',
    emoji:'🥧', instructions:'Shake whiskey and sour apple pucker with ice. Strain. Top with whipped cream.',
    ingredients:[{id:'whi2', qty:'1 oz'}, {id:'liq4', qty:'1 oz'}, {id:'ext2', qty:'dollop'}]
  }
];

// ================= STATE =================
var currentStep = 1;
var selectedIngredients = {};
var lastView = 'home';
var allDrinks = [];
var myRecipes = [];

// ================= INIT =================
function init() {
  var bg = document.getElementById('bgAnim');
  for (var i = 0; i < 15; i++) {
    var b = document.createElement('div');
    b.className = 'bubble';
    b.style.left = Math.random() * 100 + '%';
    b.style.width = b.style.height = (10 + Math.random() * 30) + 'px';
    b.style.animationDuration = (6 + Math.random() * 8) + 's';
    b.style.animationDelay = (Math.random() * 5) + 's';
    bg.appendChild(b);
  }
  allDrinks = JSON.parse(JSON.stringify(DEFAULT_DRINKS));
  myRecipes = [];
  renderBrowseFilters();
  renderBrowse('All');
  renderInvFilters();
  renderInventory('All');
}

// ================= NAVIGATION =================
function showView(name) {
  document.getElementById('nav-' + name).checked = true;
  if (name !== 'recipe') lastView = name;
  window.scrollTo(0, 0);
}
function goHome() { showView('home'); }
function goBack() { showView(lastView); }

// ================= BROWSE =================
function renderBrowseFilters() {
  var cats = ['All', 'Cocktail', 'Shot', 'Mocktail', 'Special'];
  var bar = document.getElementById('browseFilters');
  if (!bar) return;
  var html = '';
  for (var i = 0; i < cats.length; i++) {
    html += '<div class="filter-chip ' + (cats[i] === 'All' ? 'active' : '') + '" onclick="filterBrowse(this,'' + cats[i] + '')">' + cats[i] + '</div>';
  }
  bar.innerHTML = html;
}
function filterBrowse(el, cat) {
  var chips = el.parentNode.getElementsByClassName('filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  renderBrowse(cat);
}
function renderBrowse(filter) {
  var grid = document.getElementById('browseGrid');
  if (!grid) return;
  var items = [];
  for (var i = 0; i < allDrinks.length; i++) {
    if (filter === 'All' || allDrinks[i].type === filter) items.push(allDrinks[i]);
  }
  if (items.length === 0) { grid.innerHTML = '<div class="empty"><div class="empty-emoji">🍸</div><h3>No drinks found</h3></div>'; return; }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var d = items[i];
    html += '<div class="card" onclick="openRecipe('' + d.id + '')"><span class="card-emoji">' + d.emoji + '</span><div class="card-title">' + d.name + '</div><div class="card-meta">' + d.type + ' • ' + d.glass + '</div></div>';
  }
  grid.innerHTML = html;
}

// ================= INVENTORY =================
function renderInvFilters() {
  var cats = ['All'];
  var seen = {};
  for (var i = 0; i < INVENTORY.length; i++) {
    if (!seen[INVENTORY[i].category]) { seen[INVENTORY[i].category] = true; cats.push(INVENTORY[i].category); }
  }
  var bar = document.getElementById('invFilters');
  if (!bar) return;
  var html = '';
  for (var i = 0; i < cats.length; i++) {
    html += '<div class="filter-chip ' + (cats[i] === 'All' ? 'active' : '') + '" onclick="filterInv(this,'' + cats[i] + '')">' + cats[i] + '</div>';
  }
  bar.innerHTML = html;
}
function filterInv(el, cat) {
  var chips = el.parentNode.getElementsByClassName('filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  renderInventory(cat);
}
function renderInventory(filter) {
  var grid = document.getElementById('invGrid');
  if (!grid) return;
  var html = '';
  for (var i = 0; i < INVENTORY.length; i++) {
    var it = INVENTORY[i];
    if (filter !== 'All' && it.category !== filter) continue;
    html += '<div class="card"><span class="card-emoji">' + it.emoji + '</span><div class="card-title">' + it.name + '</div><div class="card-meta">' + it.category + '</div></div>';
  }
  grid.innerHTML = html;
}

// ================= CREATE =================
function startCreate() {
  currentStep = 1;
  selectedIngredients = {};
  document.getElementById('createName').value = '';
  document.getElementById('createCreator').value = '';
  document.getElementById('createType').value = 'Cocktail';
  document.getElementById('createInstructions').value = '';
  document.getElementById('createGlass').value = 'Rocks Glass';
  updateStepIndicator();
  showStep(1);
}
function updateStepIndicator() {
  var dots = document.getElementById('stepIndicator').getElementsByClassName('step-dot');
  for (var i = 0; i < dots.length; i++) {
    dots[i].classList.remove('active', 'done');
    if (i + 1 < currentStep) dots[i].classList.add('done');
    else if (i + 1 === currentStep) dots[i].classList.add('active');
  }
}
function showStep(n) {
  for (var i = 1; i <= 4; i++) {
    var el = document.getElementById('create-step-' + i);
    if (el) el.style.display = (i === n ? 'block' : 'none');
  }
  if (n === 2) { renderCreateFilters(); renderCreateGrid('All'); }
  if (n === 3) renderSelectedReview();
  if (n === 4) renderPreview();
  currentStep = n;
  updateStepIndicator();
}
function nextStep(n) {
  if (n === 2) {
    if (!document.getElementById('createName').value.trim()) { alert('Enter a drink name!'); return; }
  }
  if (n === 3) {
    var count = 0;
    for (var k in selectedIngredients) if (selectedIngredients[k]) count++;
    if (count === 0) { alert('Select at least one ingredient!'); return; }
  }
  showStep(n);
}
function prevStep(n) { showStep(n); }

function renderCreateFilters() {
  var cats = ['All'];
  var seen = {};
  for (var i = 0; i < INVENTORY.length; i++) {
    if (!seen[INVENTORY[i].category]) { seen[INVENTORY[i].category] = true; cats.push(INVENTORY[i].category); }
  }
  var bar = document.getElementById('createFilters');
  if (!bar) return;
  var html = '';
  for (var i = 0; i < cats.length; i++) {
    html += '<div class="filter-chip ' + (cats[i] === 'All' ? 'active' : '') + '" onclick="filterCreate(this,'' + cats[i] + '')">' + cats[i] + '</div>';
  }
  bar.innerHTML = html;
}
function filterCreate(el, cat) {
  var chips = el.parentNode.getElementsByClassName('filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  renderCreateGrid(cat);
}
function renderCreateGrid(filter) {
  var grid = document.getElementById('createGrid');
  if (!grid) return;
  var html = '';
  for (var i = 0; i < INVENTORY.length; i++) {
    var it = INVENTORY[i];
    if (filter !== 'All' && it.category !== filter) continue;
    var sel = selectedIngredients[it.id];
    var extra = '';
    if (sel) extra = '<div style="margin-top:5px;color:var(--neon-lime);font-weight:700;font-size:0.8rem;">' + sel + '</div>';
    html += '<div class="card ' + (sel ? 'item-selected' : '') + '" onclick="toggleIngredient('' + it.id + '')" style="position:relative;"><span class="card-emoji">' + it.emoji + '</span><div class="card-title">' + it.name + '</div><div class="card-meta">' + it.category + '</div>' + extra + '</div>';
  }
  grid.innerHTML = html;
  var count = 0;
  for (var k in selectedIngredients) if (selectedIngredients[k]) count++;
  document.getElementById('selectedCount').textContent = count;
}
function toggleIngredient(id) {
  if (selectedIngredients[id]) {
    delete selectedIngredients[id];
  } else {
    var item = null;
    for (var i = 0; i < INVENTORY.length; i++) {
      if (INVENTORY[i].id === id) { item = INVENTORY[i]; break; }
    }
    var qty = prompt('How much ' + item.name + '?
Examples: 1 oz, 2 oz, 0.5 oz, splash, dash, top');
    if (qty && qty.trim()) selectedIngredients[id] = qty.trim();
  }
  var activeChip = document.querySelector('#createFilters .filter-chip.active');
  var activeText = 'All';
  if (activeChip) activeText = activeChip.textContent || activeChip.innerText || 'All';
  renderCreateGrid(activeText);
}
function renderSelectedReview() {
  var container = document.getElementById('selectedIngredientsReview');
  if (!container) return;
  var html = '';
  for (var id in selectedIngredients) {
    if (!selectedIngredients[id]) continue;
    var it = null;
    for (var i = 0; i < INVENTORY.length; i++) {
      if (INVENTORY[i].id === id) { it = INVENTORY[i]; break; }
    }
    html += '<div class="ingredient-row"><span>' + it.emoji + ' ' + it.name + '</span><span class="qty">' + selectedIngredients[id] + '</span></div>';
  }
  container.innerHTML = '<div style="background:rgba(0,0,0,0.25);border-radius:14px;padding:14px;margin-bottom:14px;"><h3 style="margin-top:0;color:var(--neon-cyan);font-size:1.1rem;">Selected Ingredients</h3>' + (html || '<div style="color:var(--text-secondary)">None selected</div>') + '</div>';
}
function renderPreview() {
  var name = document.getElementById('createName').value;
  var creator = document.getElementById('createCreator').value || 'Anonymous';
  var type = document.getElementById('createType').value;
  var glass = document.getElementById('createGlass').value;
  var instructions = document.getElementById('createInstructions').value;
  var emoji = type === 'Shot' ? '🥃' : type === 'Mocktail' ? '🧃' : '🍸';
  var ingRows = '';
  for (var id in selectedIngredients) {
    if (!selectedIngredients[id]) continue;
    var it = null;
    for (var i = 0; i < INVENTORY.length; i++) {
      if (INVENTORY[i].id === id) { it = INVENTORY[i]; break; }
    }
    ingRows += '<div class="ingredient-row"><span>' + it.emoji + ' ' + it.name + '</span><span class="qty">' + selectedIngredients[id] + '</span></div>';
  }
  document.getElementById('createPreview').innerHTML = '<div class="recipe-hero"><span class="recipe-emoji">' + emoji + '</span><div class="recipe-name">' + name + '</div><div class="recipe-creator">Created by ' + creator + '</div><div><span class="badge">' + type + '</span><span class="badge">' + glass + '</span></div><div class="ingredient-list">' + ingRows + '</div><div style="text-align:left;white-space:pre-wrap;margin-top:14px;font-size:1rem;line-height:1.5;">' + instructions + '</div></div>';
}
function saveCreation() {
  var name = document.getElementById('createName').value.trim();
  var creator = document.getElementById('createCreator').value.trim() || 'Anonymous';
  var type = document.getElementById('createType').value;
  var glass = document.getElementById('createGlass').value;
  var instructions = document.getElementById('createInstructions').value;
  var emoji = type === 'Shot' ? '🥃' : type === 'Mocktail' ? '🧃' : '🍸';
  var ingredients = [];
  for (var id in selectedIngredients) {
    if (!selectedIngredients[id]) continue;
    ingredients.push({id: id, qty: selectedIngredients[id]});
  }
  var newDrink = {
    id: 'custom_' + Date.now(),
    name: name, creator: creator, type: type, glass: glass,
    instructions: instructions, ingredients: ingredients, emoji: emoji,
    isCustom: true
  };
  allDrinks.push(newDrink);
  myRecipes.push(newDrink);
  alert(name + ' by ' + creator + ' saved!');
  renderBrowse('All');
  showView('browse');
}

// ================= RECIPE VIEW =================
function openRecipe(id) {
  var d = null;
  for (var i = 0; i < allDrinks.length; i++) {
    if (allDrinks[i].id === id) { d = allDrinks[i]; break; }
  }
  if (!d) return;
  var ingRows = '';
  for (var i = 0; i < d.ingredients.length; i++) {
    var it = null;
    for (var j = 0; j < INVENTORY.length; j++) {
      if (INVENTORY[j].id === d.ingredients[i].id) { it = INVENTORY[j]; break; }
    }
    var name = it ? it.emoji + ' ' + it.name : d.ingredients[i].id;
    ingRows += '<div class="ingredient-row"><span>' + name + '</span><span class="qty">' + d.ingredients[i].qty + '</span></div>';
  }
  document.getElementById('recipeContent').innerHTML = '<div class="recipe-hero"><span class="recipe-emoji">' + d.emoji + '</span><div class="recipe-name">' + d.name + '</div><div class="recipe-creator">' + (d.isCustom ? '✨ Crafted by ' : 'House Recipe — ') + d.creator + '</div><div><span class="badge">' + d.type + '</span><span class="badge">' + d.glass + '</span></div><div class="ingredient-list">' + ingRows + '</div><div style="text-align:left;white-space:pre-wrap;margin-top:14px;font-size:1.05rem;line-height:1.6;">' + d.instructions + '</div></div><div class="no-print" style="background:rgba(255,215,0,0.08);border:1px solid var(--neon-gold);border-radius:14px;padding:14px;margin-top:14px;text-align:center;"><strong style="color:var(--neon-gold);font-size:1rem;">🖨️ Bartender Ticket</strong><p style="margin:6px 0 0;color:var(--text-secondary);font-size:0.9rem;">Tap "Print for Bartender" below to send this to the printer.</p></div>';
  showView('recipe');
}

// ================= MY RECIPES =================
function renderMyRecipes() {
  var container = document.getElementById('myRecipesList');
  if (!container) return;
  if (myRecipes.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-emoji">📝</div><h3>No creations yet</h3><p>Head to "Create Your Own" to craft your first drink!</p><label for="nav-create" class="btn btn-primary" style="max-width:300px;margin:18px auto 0;display:block;text-align:center;" onclick="startCreate()">Create Now</label></div>';
    return;
  }
  var html = '<div class="card-grid">';
  for (var i = 0; i < myRecipes.length; i++) {
    var d = myRecipes[i];
    html += '<div class="card" onclick="openRecipe('' + d.id + '')"><span class="card-emoji">' + d.emoji + '</span><div class="card-title">' + d.name + '</div><div class="card-meta">by ' + d.creator + '</div></div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

// Prevent double-tap zoom
var lastTouchEnd = 0;
document.addEventListener('touchend', function(e) {
  var now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, false);

// Start
init();
</script>
</body>
</html>
